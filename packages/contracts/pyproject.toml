[project]
name = "trident-contracts"
version = "1.0.0"
description = "Shared schemas for the TRIDENT maritime chokepoint intelligence platform"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["trident_contracts"]
