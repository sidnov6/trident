[project]
name = "trident-common"
version = "1.0.0"
description = "Shared runtime helpers for TRIDENT services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["trident_common"]
