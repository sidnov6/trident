name: trident

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    # timescaledb-ha bundles TimescaleDB + PostGIS on PG16.
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: trident
      POSTGRES_PASSWORD: trident
      POSTGRES_DB: trident
    ports:
      # host 5433 → container 5432 (host 5432 is often taken by a local Postgres);
      # services connect over the docker network as postgres:5432 regardless.
      - "5433:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./services/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trident -d trident"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://trident:trident@postgres:5432/trident
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cognition:
    build:
      context: .
      dockerfile: services/cognition/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://trident:trident@postgres:5432/trident
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  fleetscan:
    build:
      context: .
      dockerfile: services/fleetscan/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://trident:trident@postgres:5432/trident
    ports:
      - "8088:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  replay:
    build:
      context: .
      dockerfile: services/replay/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://trident:trident@postgres:5432/trident
    ports:
      - "8110:8100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8088
      NEXT_PUBLIC_WS_URL: ws://localhost:8088/ws
    ports:
      - "3100:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
